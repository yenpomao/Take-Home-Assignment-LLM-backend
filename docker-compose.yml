services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/llm_chat
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      PORT: 3000
    ports:
      - "3000:3000"
    command: sh -c "pnpm --filter server prisma:deploy && pnpm --filter server start"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_chat
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      interval: 5s
      retries: 10
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_chat"]
      timeout: 5s
    ports:
      - "5454:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
